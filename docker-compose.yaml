services:
  backend:
    build: ./backend
    container_name: backend
    environment:
      # Database connection
      DATABASE_URL: postgresql://devmatch:devmatch@db:5432/devmatch

      # Security (CHANGE IN PRODUCTION!)
      SECRET_KEY: change-this-secret-key-in-production-use-random-string
    volumes:
      - ./backend:/app
    expose:
      - '8000'
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
    command: >-
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: db
    environment:
      POSTGRES_USER: devmatch
      POSTGRES_PASSWORD: devmatch
      POSTGRES_DB: devmatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devmatch -d devmatch']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
